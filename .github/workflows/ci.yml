# Build, test and scan on every push.
#
# Optional scans (Semgrep with an org token, Sonar, the findings email) SKIP when their
# secret is absent rather than failing the run. A red build for a missing optional token
# teaches people that red builds are noise, which costs more than the scan is worth. Each
# one switches itself on the moment its secret is set.
#
# Every action is pinned to a full commit SHA, not a tag. A tag is mutable - the owner can
# repoint @v7 at anything - which is how the tj-actions/changed-files and trivy-action
# compromises reached everyone downstream. The trailing comment records the version so the
# SHA is legible; re-resolve it when bumping.
#
# The versions themselves were checked against current releases rather than assumed: the
# once-standard semgrep-action and sonarcloud-github-action are both archived now.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build, test, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      # rules/code-quality.md gates every change on this, so CI does too rather than
      # trusting that someone ran it.
      - name: Verify formatting
        run: dotnet format --verify-no-changes

      # Warnings are errors, so this also fails on NU1901-NU1904: since .NET 10, NuGet
      # audits transitive packages by default, which is what turns a vulnerable dependency
      # into a failed build rather than a report nobody reads.
      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      # Defence in depth: the build above should already have failed on anything
      # vulnerable. This catches a case the audit misses and, unlike the audit, names the
      # packages in the log.
      #
      # The grep is not laziness: `dotnet list package --vulnerable` exits 0 whether or not
      # it finds anything (NuGet/Home#11315), so the exit code cannot be used.
      - name: Audit dependencies
        run: |
          set -euo pipefail
          output=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected. See the listing above."
            exit 1
          fi
          echo "No vulnerable packages."

      # Proves the library still packs, every push - not only on release day, when a
      # packaging problem is most expensive to discover.
      - name: Pack
        run: dotnet pack -c Release --no-build -o artifacts

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages
          path: artifacts/*
          retention-days: 7

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # semgrep/semgrep-action and returntocorp/semgrep-action are both archived; the
      # current way is this image plus `semgrep ci`.
      #
      # SEMGREP_APP_TOKEN is optional. With it, the org's policy and history apply; without
      # it, Semgrep still scans against the community rules named in SEMGREP_RULES. So this
      # job is useful on a repo with no secrets at all, which is the state this one is in.
      - name: Scan
        run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
          SEMGREP_RULES: p/default p/csharp p/secrets

  sonar:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    # Secrets cannot be referenced from a job-level `if:`, so the token comes in as env and
    # every step tests it. The job itself runs and reports success having done nothing,
    # which is the intended "not configured yet" outcome.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: michael-m-robinson_Authentication
      SONAR_ORGANIZATION: michael-m-robinson
    steps:
      - name: Report skip
        if: env.SONAR_TOKEN == ''
        run: echo "::notice::SONAR_TOKEN is not set; skipping Sonar analysis."

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: env.SONAR_TOKEN != ''
        with:
          # Sonar needs full history to attribute issues to the commit that introduced them.
          fetch-depth: 0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        if: env.SONAR_TOKEN != ''
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # dotnet-sonarscanner, not the generic scan action: it is what Sonar's own .NET docs
      # call for, and it is the only way the C# analyzer sees the build. v7+ bundles a JRE,
      # so no setup-java step.
      - name: Install scanners
        if: env.SONAR_TOKEN != ''
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

      # Coverage goes through dotnet-coverage, not coverlet: Sonar's C# analyzer has no
      # property that reads Cobertura, which is what coverlet.collector emits by default -
      # so the report our test project already produces would be silently ignored.
      - name: Begin analysis
        if: env.SONAR_TOKEN != ''
        run: >
          dotnet-sonarscanner begin
          /k:"${{ env.SONAR_PROJECT_KEY }}"
          /o:"${{ env.SONAR_ORGANIZATION }}"
          /d:sonar.token="${{ env.SONAR_TOKEN }}"
          /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml

      - name: Build
        if: env.SONAR_TOKEN != ''
        run: dotnet build -c Release --no-incremental

      - name: Test with coverage
        if: env.SONAR_TOKEN != ''
        run: dotnet-coverage collect "dotnet test -c Release --no-build" -f xml -o coverage.xml

      - name: End analysis
        if: env.SONAR_TOKEN != ''
        run: dotnet-sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN }}"

  notify:
    name: Email findings
    runs-on: ubuntu-latest
    needs: [build, semgrep, sonar]
    if: always()
    env:
      FINDINGS_EMAIL: ${{ secrets.FINDINGS_EMAIL }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      # rules/ci-scanning.md: the subject carries a glanceable indicator, because the point
      # of a per-run email is being readable without opening it.
      #   green  clean            red  blocking findings
      #   yellow non-blocking     bang scan error
      - name: Summarise
        id: summary
        # Through env, not interpolated into the script. These particular values are a fixed
        # set the runner controls, so nothing could be injected through them today - but the
        # habit is what matters: a `run:` block should never have expression output pasted
        # into it, because the next person to add one will not check where the value came
        # from.
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
          SONAR_RESULT: ${{ needs.sonar.result }}
        run: |
          set -euo pipefail
          build="$BUILD_RESULT"
          semgrep="$SEMGREP_RESULT"
          sonar="$SONAR_RESULT"

          if [ "$build" = 'failure' ] || [ "$semgrep" = 'failure' ]; then
            # Build, tests, the dependency audit and Semgrep all block.
            icon='🔴'; verdict='Blocking findings'
          elif [ "$build" = 'cancelled' ] || [ "$semgrep" = 'cancelled' ] || [ "$sonar" = 'failure' ]; then
            # Sonar failing is a scan problem, not a finding about the code.
            icon='❗'; verdict='Scan error'
          elif [ "$sonar" = 'skipped' ] || [ "$sonar" = 'cancelled' ]; then
            icon='🟡'; verdict='Passed, some scans did not run'
          else
            icon='🟢'; verdict='Clean'
          fi

          {
            echo "icon=$icon"
            echo "verdict=$verdict"
          } >> "$GITHUB_OUTPUT"

          echo "$icon $verdict (build=$build semgrep=$semgrep sonar=$sonar)"

      - name: Report skip
        if: env.FINDINGS_EMAIL == '' || env.SMTP_USERNAME == ''
        run: echo "::notice::FINDINGS_EMAIL or SMTP credentials are not set; skipping the summary email."

      - name: Send summary
        if: env.FINDINGS_EMAIL != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != ''
        uses: dawidd6/action-send-mail@94de994a9f6fffee200243214e17002e2920bb59 # v18
        with:
          server_address: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          server_port: ${{ secrets.SMTP_PORT || 465 }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.FINDINGS_EMAIL }}
          from: Authentication CI <${{ secrets.SMTP_USERNAME }}>
          subject: '${{ steps.summary.outputs.icon }} ${{ github.repository }} CI: ${{ steps.summary.outputs.verdict }}'
          body: |
            ${{ steps.summary.outputs.icon }} ${{ steps.summary.outputs.verdict }}

            Repository: ${{ github.repository }}
            Branch:     ${{ github.ref_name }}
            Commit:     ${{ github.sha }}
            Author:     ${{ github.actor }}

            Build, test, audit : ${{ needs.build.result }}
            Semgrep            : ${{ needs.semgrep.result }}
            Sonar              : ${{ needs.sonar.result }}

            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
